<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Age Agent OS</title>
  <style>
    /* ── Design Tokens ── */
    [data-theme="dark"] {
      --bg-primary: #212121;
      --bg-secondary: #171717;
      --bg-tertiary: #2f2f2f;
      --bg-elevated: #303030;
      --bg-hover: #3a3a3a;
      --bg-active: #424242;
      --accent: #003f7a;
      --accent-hover: #0055a4;
      --accent-subtle: rgba(0,63,122,0.15);
      --accent-text: #006acd;
      --text-primary: #ececec;
      --text-secondary: #b4b4b4;
      --text-muted: #8e8e8e;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.1);
      --user-bubble: #003f7a;
      --user-bubble-text: #fff;
      --agent-bubble: #2f2f2f;
      --agent-bubble-text: #ececec;
      --code-bg: #1a1a1a;
      --scrollbar: #424242;
      --success: #22c55e;
      --success-bg: rgba(34,197,94,0.1);
      --error: #ef4444;
      --error-bg: rgba(239,68,68,0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245,158,11,0.1);
      --input-bg: #2a2a2a;
    }
    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f8f8;
      --bg-tertiary: #f0f0f0;
      --bg-elevated: #e8e8e8;
      --bg-hover: #ebebeb;
      --bg-active: #e0e0e0;
      --accent: #003f7a;
      --accent-hover: #002d58;
      --accent-subtle: rgba(0,63,122,0.08);
      --accent-text: #003f7a;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --border: #e5e5e5;
      --border-bright: #d4d4d4;
      --user-bubble: #003f7a;
      --user-bubble-text: #ffffff;
      --agent-bubble: #f0f0f0;
      --agent-bubble-text: #111111;
      --code-bg: #f5f5f5;
      --scrollbar: #d4d4d4;
      --success: #16a34a;
      --success-bg: rgba(22,163,74,0.08);
      --error: #dc2626;
      --error-bg: rgba(220,38,38,0.06);
      --warning: #d97706;
      --warning-bg: rgba(217,119,6,0.08);
      --input-bg: #f5f5f5;
    }
    :root {
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --transition: 150ms ease;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono','Fira Code','JetBrains Mono',Menlo,Consolas,monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    #app { height: 100vh; display: flex; flex-direction: column; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── Layout Shell ── */
    .shell {
      display: flex;
      height: 100vh;
      background: var(--bg-primary);
      padding: 8px;
      gap: 8px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px;
      margin-top: 8px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #fff;
      flex-shrink: 0;
      letter-spacing: -1px;
    }
    .brand-name {
      font-size: 15px; font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 10px; color: var(--text-muted);
      font-weight: 400;
    }
    .sidebar-nav {
      flex: 1;
      padding: 4px 8px;
      display: flex; flex-direction: column;
      gap: 2px;
      overflow-y: auto;
    }
    .nav-item {
      display: flex; align-items: center;
      gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      border: none; background: none;
      width: 100%; text-align: left;
      font-family: var(--font-sans);
    }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-subtle); color: var(--accent-text); }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .sidebar-footer-name {
      font-size: 12px; color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .theme-toggle {
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      padding: 4px; border-radius: 6px;
      display: flex; align-items: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover { color: var(--text-primary); background: var(--bg-hover); }

    /* ── Main Content ── */
    .content {
      flex: 1;
      display: flex; flex-direction: column;
      background: var(--bg-primary);
      border-radius: 16px;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Screen Header ── */
    .screen-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      gap: 12px; flex-shrink: 0;
    }
    .screen-header h1 {
      font-size: 16px; font-weight: 600;
      color: var(--text-primary);
    }
    .screen-header-actions { margin-left: auto; display: flex; gap: 8px; }
    .screen-body {
      flex: 1; overflow-y: auto; padding: 20px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: var(--radius-md);
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none;
      font-family: var(--font-sans);
      transition: all var(--transition);
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg-tertiary); color: var(--text-primary);
      border: 1px solid var(--border-bright);
    }
    .btn-secondary:hover { background: var(--bg-hover); }
    .btn-ghost {
      background: none; color: var(--text-secondary);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger {
      background: var(--error-bg); color: var(--error);
    }
    .btn-danger:hover { background: var(--error); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon {
      padding: 7px; background: var(--bg-tertiary);
      border: 1px solid var(--border-bright);
      color: var(--text-secondary); border-radius: var(--radius-md);
      cursor: pointer; display: flex; align-items: center;
      transition: all var(--transition);
    }
    .btn-icon:hover { color: var(--text-primary); background: var(--bg-hover); }

    /* ── Input ── */
    .input {
      width: 100%; padding: 9px 12px;
      background: var(--input-bg);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 13px; font-family: var(--font-sans);
      outline: none;
      transition: border-color var(--transition);
    }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text-muted); }
    textarea.input { resize: none; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .badge-blue { background: var(--accent-subtle); color: var(--accent-text); }
    .badge-green { background: var(--success-bg); color: var(--success); }
    .badge-orange { background: var(--warning-bg); color: var(--warning); }
    .badge-red { background: var(--error-bg); color: var(--error); }

    /* ── Card ── */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 12px; }

    /* ── Toggle Switch ── */
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--bg-active); border-radius: 999px;
      cursor: pointer; transition: background var(--transition);
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; left: 3px; top: 3px;
      transition: transform var(--transition);
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: var(--radius-md); width: fit-content; }
    .tab {
      padding: 6px 14px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; background: none;
      color: var(--text-secondary); font-family: var(--font-sans);
      transition: all var(--transition);
    }
    .tab.active { background: var(--bg-primary); color: var(--text-primary); }

    /* ── Chat Screen ── */
    .chat-wrap { display: flex; flex-direction: column; height: 100%; }
    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .chat-header-title { font-size: 14px; font-weight: 600; flex: 1; }
    .chat-messages {
      flex: 1; overflow-y: auto;
      padding: 20px; display: flex; flex-direction: column; gap: 16px;
    }
    .chat-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 20px;
      text-align: center;
    }
    .chat-empty-icon {
      width: 56px; height: 56px;
      background: var(--accent-subtle);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-text);
    }
    .chat-empty h2 { font-size: 20px; font-weight: 600; }
    .chat-empty p { color: var(--text-muted); font-size: 14px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 520px; }
    .suggestion-btn {
      padding: 8px 14px; border-radius: var(--radius-xl);
      background: var(--bg-secondary); border: 1px solid var(--border-bright);
      color: var(--text-secondary); font-size: 13px;
      cursor: pointer; transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .suggestion-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--accent); }
    .message { display: flex; gap: 12px; max-width: 800px; }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      color: var(--text-secondary);
    }
    .message.user .message-avatar { background: var(--accent); color: #fff; }
    .message-bubble {
      padding: 12px 16px; border-radius: var(--radius-lg);
      background: var(--agent-bubble); color: var(--agent-bubble-text);
      font-size: 14px; line-height: 1.6; max-width: 600px;
    }
    .message.user .message-bubble {
      background: var(--user-bubble); color: var(--user-bubble-text);
      border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
    }
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-input-wrap {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg); padding: 8px 12px;
      transition: border-color var(--transition);
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); }
    .chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-primary); font-size: 14px;
      font-family: var(--font-sans); resize: none;
      max-height: 120px; min-height: 22px; line-height: 1.5;
    }
    .chat-input::placeholder { color: var(--text-muted); }
    .chat-send-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); padding: 6px 10px;
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center;
    }
    .chat-send-btn:hover { background: var(--accent-hover); }
    .chat-footer {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 0 0;
      font-size: 11px; color: var(--text-muted);
    }
    .usage-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; background: var(--bg-secondary);
      border-radius: 999px; font-size: 11px; color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* ── Sessions ── */
    .session-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: var(--radius-md);
      cursor: pointer; transition: all var(--transition);
      border: 1px solid transparent;
    }
    .session-item:hover { background: var(--bg-hover); border-color: var(--border-bright); }
    .session-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Agents ── */
    .agent-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color var(--transition);
    }
    .agent-card:hover { border-color: var(--border-bright); }
    .agent-card.active-profile { border-color: var(--accent); }
    .agent-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-subtle);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--accent-text);
    }
    .agent-name { font-size: 15px; font-weight: 600; }
    .agent-meta { font-size: 12px; color: var(--text-muted); }
    .agent-actions { display: flex; gap: 6px; }

    /* ── Skills ── */
    .skill-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .skill-name { font-size: 14px; font-weight: 600; }
    .skill-category { font-size: 11px; color: var(--text-muted); }
    .skill-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

    /* ── Tools ── */
    .tool-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }
    .tool-icon {
      width: 36px; height: 36px;
      background: var(--bg-tertiary); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-text); flex-shrink: 0;
    }
    .tool-info { flex: 1; }
    .tool-name { font-size: 13px; font-weight: 600; }
    .tool-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Memory ── */
    .memory-item {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .memory-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); margin-top: 6px; flex-shrink: 0;
    }

    /* ── Gateway ── */
    .gateway-platform {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }
    .gateway-icon {
      width: 38px; height: 38px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    /* ── Schedules ── */
    .schedule-row {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .cron-chip {
      font-family: var(--font-mono); font-size: 12px;
      padding: 3px 8px; background: var(--bg-tertiary);
      border-radius: 6px; color: var(--text-secondary);
      border: 1px solid var(--border-bright);
    }

    /* ── Models ── */
    .model-row {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
    }

    /* ── Soul ── */
    .soul-editor {
      width: 100%; height: 360px; resize: vertical;
      background: var(--code-bg); border: 1px solid var(--border-bright);
      border-radius: var(--radius-md); padding: 14px;
      color: var(--text-primary); font-family: var(--font-mono);
      font-size: 13px; line-height: 1.7; outline: none;
    }
    .soul-editor:focus { border-color: var(--accent); }

    /* ── Settings ── */
    .settings-section { margin-bottom: 28px; }
    .settings-section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { flex: 1; font-size: 13px; }
    .settings-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Providers ── */
    .provider-card {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color var(--transition);
    }
    .provider-card:hover { border-color: var(--border-bright); }
    .provider-logo {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; background: var(--bg-tertiary);
    }
    .provider-name { font-size: 14px; font-weight: 600; }
    .provider-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot.connected { background: var(--success); }
    .status-dot.disconnected { background: var(--text-muted); }

    /* ── Office ── */
    .office-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 20px;
      text-align: center;
    }
    .office-3d-placeholder {
      width: 280px; height: 200px;
      background: var(--bg-secondary); border: 1px solid var(--border-bright);
      border-radius: var(--radius-xl);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .office-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.5;
    }

    /* ── Kanban ── */
    .kanban-wrap { display: flex; gap: 12px; height: 100%; overflow-x: auto; padding-bottom: 4px; }
    .kanban-col { min-width: 240px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: var(--radius-md);
      background: var(--bg-secondary); font-size: 13px; font-weight: 600;
    }
    .kanban-card {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 12px;
      font-size: 13px; cursor: grab;
      transition: border-color var(--transition);
    }
    .kanban-card:hover { border-color: var(--border-bright); }
    .kanban-card-title { font-weight: 500; margin-bottom: 4px; }
    .kanban-card-meta { font-size: 11px; color: var(--text-muted); }

    /* ── Loading dots ── */
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
    .typing-dot { display: inline-block; width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }

        "I'll route this to Lane B (DeepSeek V4 Pro) — standard complexity, estimated $350 close value. Firing the pipeline now.\n\n**Build Brief generated.** Sending to `cinematic-prompt-director` for Higgsfield YAML prompt.",
        "Brand extraction complete. **Brand Token Package:**\n\n- `--color-primary: #1a4fa0` (HIGH)\n- `--font-display: Montserrat, sans-serif` (HIGH)\n- `--border-radius: 8px` (MEDIUM)\n\nRouting to `cinematic-website-builder` now.",
        "Hero image queued with GPT Image 2 (gpt_image_2). Parameters:\n- Aspect: 16:9\n- Quality: high\n- Resolution: 4K\n\nJob ID: `img_a7f3b2c1` — estimated 45s. I'll inject the URL into the HTML once complete.",
        "Virality score: **87/100** 🔥\n\nHook strength: **Strong** | Attention curve: **Rising** | Retention risk: **Low**\n\nReady to deploy to Vercel.",
      ];
      const reply = responses[Math.floor(Math.random() * responses.length)];
      setMsgs(prev => [...prev, { id: Date.now()+1, role:'agent', content: reply }]);
      setLoading(false);
    }, 1200 + Math.random() * 800);
  }, [input]);

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  return html`
    <div class="chat-wrap">
      <div class="chat-header">
        <div class="chat-header-title">Chat</div>
        <div style="display:flex;gap:8px;">

          </button>
          <button class="btn-icon" title="Clear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3-3h8"/></svg>
          </button>
        </div>
      </div>

      <div class="chat-messages">
        ${msgs.length === 0 ? html`
          <div class="chat-empty">
            <div class="chat-empty-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <h2>Space Age Agent OS</h2>
            <p>Your 24/7 AI pipeline orchestrator. Route leads, generate assets,<br/>deploy sites, and close deals on autopilot.</p>
            <div class="suggestions">
              ${SUGGESTIONS.map(s => html`
                <button class="suggestion-btn" onClick=${() => setInput(s)}>${s}</button>
              `)}
            </div>
          </div>
        ` : html`
          ${msgs.map(m => html`
            <div class="message ${m.role}">
              <div class="message-avatar">${m.role === 'user' ? 'U' : 'H'}</div>
              <div class="message-bubble" style="white-space:pre-wrap">${m.content}</div>
            </div>
          `)}
          ${loading ? html`
            <div class="message">
              <div class="message-avatar">H</div>
              <div class="message-bubble">
                <div class="typing-indicator">
                  <span class="typing-dot"></span>
                  <span class="typing-dot"></span>
                  <span class="typing-dot"></span>
                </div>
              </div>
            </div>
          ` : null}
        `}
        <div ref=${bottomRef}/>
      </div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input"
            ref=${textareaRef}
            rows="1"
            placeholder="Message Hermes... (Enter to send, Shift+Enter for newline)"
            value=${input}
            onInput=${e => setInput(e.target.value)}
            onKeyDown=${onKey}
          />
          <button class="chat-send-btn" onClick=${send} disabled=${!input.trim()}>
            <${SendIcon} size=${14}/>
          </button>
        </div>
        <div class="chat-footer">
          <span class="usage-chip">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>

    </div>
  `;
}

          <div class="settings-row">
            <div class="settings-label">Version</div>
            <span class="badge badge-blue">v0.4.3 — Space Age Edition</span>
          </div>
          <div class="settings-row">
            <div class="settings-label">Built on</div>
            <span style="font-size:12px;color:var(--text-muted);">Hermes Desktop · Electron 39 · React 19 · Tailwind 4</span>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ── Main App ── */
function App() {
  const [view, setView] = useState('chat');
  const [theme, setTheme] = useState('dark');
  const [profile, setProfile] = useState('default');

  const toggleTheme = useCallback(() => {
    const next = theme === 'dark' ? 'light' : 'dark';
    setTheme(next);
    document.documentElement.setAttribute('data-theme', next);
  }, [theme]);

  const screens = {
    chat:      html`<${ChatScreen}/>`,
    sessions:  html`<${SessionsScreen}/>`,
    agents:    html`<${AgentsScreen}/>`,
    office:    html`<${OfficeScreen}/>`,
    kanban:    html`<${KanbanScreen}/>`,
    models:    html`<${ModelsScreen}/>`,
    providers: html`<${ProvidersScreen}/>`,
    skills:    html`<${SkillsScreen}/>`,
    soul:      html`<${SoulScreen}/>`,
    memory:    html`<${MemoryScreen}/>`,
    tools:     html`<${ToolsScreen}/>`,
    schedules: html`<${SchedulesScreen}/>`,
    gateway:   html`<${GatewayScreen}/>`,
    settings:  html`<${SettingsScreen} onThemeToggle=${toggleTheme} theme=${theme}/>`,
  };

  return html`
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">SA</div>
          <div>
            <div class="brand-name">Space Age</div>
            <div class="brand-sub">Agent OS</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          ${NAV.map(({ id, label }) => html`
            <button
              key=${id}
              class="nav-item ${view === id ? 'active' : ''}"
              onClick=${() => setView(id)}
            >
              <${I} name=${id} size=${15}/>
              ${label}
            </button>
          `)}
        </nav>

        <div class="sidebar-footer">
          <span class="sidebar-footer-name">${profile}</span>
          <button class="theme-toggle" onClick=${toggleTheme} title="Toggle theme">
            ${theme === 'dark' ? html`<${SunIcon} size=${14}/>` : html`<${MoonIcon} size=${14}/>`}
          </button>
        </div>
      </aside>

      <main class="content">
        ${screens[view]}
      </main>
    </div>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>

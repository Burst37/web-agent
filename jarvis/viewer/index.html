<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS — Knowledge Galaxy</title>
<style>
  :root {
    --amber: #ffb347;
    --panel-bg: rgba(8, 12, 24, 0.82);
    --edge: rgba(120, 170, 255, 0.18);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; width: 100%;
    background: #000006; color: #e8eefc; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  /* CSS starfield: parallax layers behind the WebGL canvas. */
  #stars, #stars2, #stars3 { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  #stars  { box-shadow: var(--s1); animation: twinkle 6s ease-in-out infinite; }
  #stars2 { box-shadow: var(--s2); animation: twinkle 9s ease-in-out infinite; opacity: .7; }
  #stars3 { box-shadow: var(--s3); animation: twinkle 13s ease-in-out infinite; opacity: .5; }
  @keyframes twinkle { 0%,100%{opacity:.9} 50%{opacity:.4} }

  #graph { position: fixed; inset: 0; z-index: 1; }

  #panel {
    position: fixed; top: 0; right: 0; height: 100%; width: 380px; max-width: 90vw;
    background: var(--panel-bg); backdrop-filter: blur(14px);
    border-left: 1px solid var(--edge); z-index: 5;
    transform: translateX(105%); transition: transform .5s cubic-bezier(.2,.8,.2,1);
    padding: 26px 24px; overflow-y: auto;
  }
  #panel.open { transform: translateX(0); }
  #panel .group-tag {
    display: inline-block; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: #04121f; padding: 3px 10px; border-radius: 999px; font-weight: 700; margin-bottom: 14px;
  }
  #panel h2 { margin: 0 0 14px; font-size: 22px; font-weight: 650; line-height: 1.25; }
  #panel .excerpt { font-size: 14.5px; line-height: 1.72; color: #c7d3ea; white-space: pre-wrap; }
  #panel .path { margin-top: 22px; font-size: 12px; color: #6f7f9c; font-family: ui-monospace, Menlo, monospace; }
  #panel .close {
    position: absolute; top: 16px; right: 18px; cursor: pointer; color: #7d8bab;
    font-size: 22px; line-height: 1; background: none; border: none;
  }
  #panel .close:hover { color: #e8eefc; }

  #brand { position: fixed; top: 22px; left: 26px; z-index: 4; pointer-events: none; }
  #brand .title { font-weight: 700; letter-spacing: .34em; font-size: 15px; color: #dfe8fb; }
  #brand .sub   { font-size: 11px; letter-spacing: .18em; color: #6f7f9c; margin-top: 4px; text-transform: uppercase; }

  #status {
    position: fixed; left: 50%; top: 20px; transform: translateX(-50%); z-index: 6;
    font-size: 13px; color: var(--amber); letter-spacing: .06em; min-height: 18px;
    text-shadow: 0 0 12px rgba(255,179,71,.5); transition: opacity .3s; opacity: 0;
  }
  #status.show { opacity: 1; }
  #status .dot { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  #bar {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
    width: min(720px, 92vw); z-index: 7;
    display: flex; align-items: center; gap: 10px;
    background: var(--panel-bg); backdrop-filter: blur(14px);
    border: 1px solid var(--edge); border-radius: 16px; padding: 10px 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
  }
  #answer {
    position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%);
    width: min(720px, 92vw); z-index: 7;
    background: var(--panel-bg); backdrop-filter: blur(14px);
    border: 1px solid var(--edge); border-radius: 14px; padding: 16px 20px;
    font-size: 15px; line-height: 1.6; color: #eaf0ff;
    opacity: 0; transform: translate(-50%, 8px); transition: opacity .35s, transform .35s;
    pointer-events: none;
  }
  #answer.show { opacity: 1; transform: translate(-50%, 0); }
  #answer .who { color: var(--amber); font-weight: 700; letter-spacing: .04em; margin-right: 8px; }
  #q { flex: 1; background: transparent; border: none; outline: none; color: #eaf0ff; font-size: 15px; padding: 8px 8px; }
  #q::placeholder { color: #6f7f9c; }
  .btn {
    background: rgba(255,179,71,.12); border: 1px solid rgba(255,179,71,.35);
    color: var(--amber); border-radius: 11px; height: 40px; min-width: 44px; padding: 0 12px;
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background .2s, transform .1s;
  }
  .btn:hover { background: rgba(255,179,71,.22); }
  .btn:active { transform: scale(.94); }
  .btn.live { background: rgba(255,80,80,.22); border-color: rgba(255,80,80,.6); color: #ff8a8a; }
  #hint { position: fixed; left: 26px; bottom: 26px; z-index: 4; font-size: 12px; color: #556; max-width: 240px; transition: opacity .5s; }
</style>
</head>
<body>
  <div id="stars"></div><div id="stars2"></div><div id="stars3"></div>
  <div id="graph"></div>

  <div id="brand"><div class="title">J A R V I S</div><div class="sub">Knowledge Galaxy</div></div>
  <div id="status"></div>

  <div id="panel">
    <button class="close" title="Close">&times;</button>
    <span class="group-tag"></span>
    <h2></h2>
    <div class="excerpt"></div>
    <div class="path"></div>
  </div>

  <div id="answer"><span class="who">JARVIS</span><span class="text"></span></div>

  <div id="bar">
    <button class="btn" id="mic" title="Speak">🎙</button>
    <input id="q" placeholder="Ask your notes…  (or say “remember that …”)" autocomplete="off" />
    <button class="btn" id="send" title="Send">➤</button>
    <button class="btn" id="mute" title="Toggle voice">🔊</button>
  </div>

  <div id="hint">Click a star to dive in. Click once anywhere to enable voice.</div>

  <!-- 3d-force-graph bundles its own THREE, so no separate three.js is needed. -->
  <script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
  <script src="graph-data.js"></script>
  <script>
  // ===================================================================== //
  //  PROMPT 1 — THE GALAXY
  // ===================================================================== //

  // A CSS starfield (three parallax layers of box-shadow dots).
  (function starfield() {
    function make(n, spread) {
      const s = [];
      for (let i = 0; i < n; i++) {
        const x = (Math.random() * spread | 0) - (spread >> 1);
        const y = (Math.random() * spread | 0) - (spread >> 1);
        const b = (Math.random() * 0.6 + 0.4).toFixed(2);
        s.push(`${x}px ${y}px 0 rgba(255,255,255,${b})`);
      }
      return s.join(",");
    }
    const root = document.documentElement.style;
    root.setProperty("--s1", make(160, 3000));
    root.setProperty("--s2", make(90, 3000));
    root.setProperty("--s3", make(60, 3000));
    for (const id of ["stars", "stars2", "stars3"]) {
      const el = document.getElementById(id);
      el.style.left = "50%"; el.style.top = "50%"; el.style.width = el.style.height = "1px";
    }
  })();

  // Colour palette per group.
  const GROUPS = [...new Set(GRAPH.nodes.map(n => n.group))].sort();
  const PALETTE = ["#66d9ef","#ffb347","#a679ff","#5ce6a5","#ff6b9d","#f7e05a","#5ab0ff","#ff8f5a","#8affc1","#c98bff"];
  const groupColor = {};
  GROUPS.forEach((g, i) => groupColor[g] = PALETTE[i % PALETTE.length]);
  function dim(hex) {
    const n = parseInt(hex.slice(1), 16);
    const r = ((n >> 16) & 255) * 0.32, g = ((n >> 8) & 255) * 0.32, b = (n & 255) * 0.32;
    return `rgb(${r|0},${g|0},${b|0})`;
  }

  // Adjacency for neighbour highlighting.
  const neighbors = new Map();
  GRAPH.nodes.forEach(n => neighbors.set(n.id, new Set()));
  GRAPH.links.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    neighbors.get(s)?.add(t); neighbors.get(t)?.add(s);
  });

  let highlightNodes = new Set();
  let highlightLinks = new Set();
  const pulsing = new Map();           // node.id -> { until }

  const BASE_VAL = 4;
  function nodeVal(n) {
    let v = BASE_VAL;
    const p = pulsing.get(n.id);
    if (p) { const t = (Math.sin(Date.now() / 120) + 1) / 2; v = BASE_VAL + 9 * t; }   // glow pulse (Prompt 6)
    if (highlightNodes.size && highlightNodes.has(n.id)) v *= 1.7;
    return v;
  }
  function nodeColor(n) {
    const c = groupColor[n.group] || "#88aaff";
    if (highlightNodes.size === 0) return c;
    return highlightNodes.has(n.id) ? c : dim(c);
  }

  const Graph = ForceGraph3D()(document.getElementById("graph"))
    .backgroundColor("#00000a")
    .graphData({ nodes: GRAPH.nodes.map(n => ({ ...n })), links: GRAPH.links.map(l => ({ ...l })) })
    .nodeLabel(n => `<div style="font-weight:600">${n.label}</div><div style="opacity:.6;font-size:11px">${n.group}</div>`)
    .nodeRelSize(5)
    .nodeVal(nodeVal)
    .nodeColor(nodeColor)
    .nodeOpacity(0.92)
    .nodeResolution(16)
    .linkColor(l => highlightLinks.has(l) ? "#ffd98a" : "rgba(120,170,255,0.20)")
    .linkWidth(l => highlightLinks.has(l) ? 1.6 : 0.4)
    .linkOpacity(0.5)
    .linkDirectionalParticles(l => highlightLinks.has(l) ? 3 : 0)
    .linkDirectionalParticleWidth(1.8)
    .linkDirectionalParticleColor(() => "#ffd98a")
    .onNodeClick(node => focusNode(node, true))
    .onBackgroundClick(() => { clearHighlight(); closePanel(); });

  Graph.d3Force("charge").strength(-170);
  Graph.d3Force("link").distance(60);

  // Force the styling accessors to re-run after a state change.
  function refresh() {
    Graph.nodeColor(nodeColor).nodeVal(nodeVal)
         .linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth())
         .linkDirectionalParticles(Graph.linkDirectionalParticles());
  }

  // Camera fly-to.
  function flyTo(node, ms = 1400) {
    const dist = Math.hypot(node.x || 0, node.y || 0, node.z || 0) || 1;
    const ratio = 1 + 170 / dist;
    Graph.cameraPosition(
      { x: (node.x || 0) * ratio, y: (node.y || 0) * ratio, z: (node.z || 0) * ratio },
      node, ms);
  }

  function applyHighlight(nodeIds) {
    highlightNodes = new Set(nodeIds);
    highlightLinks = new Set();
    Graph.graphData().links.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      if (highlightNodes.has(s) && highlightNodes.has(t)) highlightLinks.add(l);
    });
    refresh();
  }
  function clearHighlight() { applyHighlight([]); }

  function focusNode(node, openPanelToo) {
    applyHighlight([node.id, ...(neighbors.get(node.id) || [])]);
    flyTo(node);
    if (openPanelToo) openPanel(node);
  }

  // Side panel.
  const panel = document.getElementById("panel");
  function openPanel(node) {
    const tag = panel.querySelector(".group-tag");
    tag.textContent = node.group;
    tag.style.background = groupColor[node.group] || "#88aaff";
    panel.querySelector("h2").textContent = node.label;
    panel.querySelector(".excerpt").textContent = node.excerpt || "";
    panel.querySelector(".path").textContent = node.path || "";
    panel.classList.add("open");
  }
  function closePanel() { panel.classList.remove("open"); }
  panel.querySelector(".close").onclick = closePanel;

  // Slow idle auto-orbit; pauses while the user interacts.
  let idle = true, angle = 0, lastInteract = Date.now();
  const RESUME_AFTER = 5000;
  ["mousedown","wheel","touchstart","keydown"].forEach(ev =>
    document.addEventListener(ev, () => { lastInteract = Date.now(); idle = false; }, { passive: true }));

  function tick() {
    if (Date.now() - lastInteract > RESUME_AFTER) idle = true;
    if (idle) {
      angle += 0.0006;
      const r = 340;
      Graph.cameraPosition({ x: r * Math.sin(angle), y: 40 * Math.sin(angle * 0.5), z: r * Math.cos(angle) });
    }
    if (pulsing.size) {
      const now = Date.now();
      pulsing.forEach((p, id) => { if (now > p.until) pulsing.delete(id); });
      Graph.nodeVal(nodeVal);         // animate the pulse
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ===================================================================== //
  //  PROMPT 3 — THE VOICE
  // ===================================================================== //
  const statusEl = document.getElementById("status");
  let statusTimer = null;
  function setStatus(txt, sticky) {
    if (!txt) { statusEl.classList.remove("show"); return; }
    statusEl.innerHTML = `<span class="dot">●</span> ${txt}`;
    statusEl.classList.add("show");
    clearTimeout(statusTimer);
    if (!sticky) statusTimer = setTimeout(() => statusEl.classList.remove("show"), 2500);
  }

  let voiceOn = true, pickedVoice = null, audioUnlocked = false;
  const muteBtn = document.getElementById("mute");
  muteBtn.onclick = () => {
    voiceOn = !voiceOn;
    muteBtn.textContent = voiceOn ? "🔊" : "🔇";
    if (!voiceOn) window.speechSynthesis.cancel();
  };

  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    pickedVoice =
      voices.find(v => /en-GB/i.test(v.lang) && /(daniel|arthur|george|male)/i.test(v.name)) ||
      voices.find(v => /en-GB/i.test(v.lang)) ||
      voices.find(v => /British|UK/i.test(v.name)) ||
      voices.find(v => /^en/i.test(v.lang)) || voices[0] || null;
  }
  window.speechSynthesis.onvoiceschanged = pickVoice;
  pickVoice();

  function speak(text) {
    if (!voiceOn || !text) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (pickedVoice) u.voice = pickedVoice;
    u.lang = pickedVoice ? pickedVoice.lang : "en-GB";
    u.rate = 1.02; u.pitch = 1.0;
    window.speechSynthesis.speak(u);
  }

  // Unlock audio on first interaction, then deliver the boot greeting (Prompt 5).
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    const prime = new SpeechSynthesisUtterance(" ");
    prime.volume = 0; window.speechSynthesis.speak(prime);
    setTimeout(bootGreeting, 200);
  }
  document.addEventListener("click", unlockAudio);
  document.addEventListener("keydown", unlockAudio);

  let greeted = false;
  function bootGreeting() {
    if (greeted) return; greeted = true;
    const n = Graph.graphData().nodes.length;
    const line = `Good evening, sir. ${n} notes indexed, all present and accounted for.`;
    showAnswer(line); speak(line);
    document.getElementById("hint").style.opacity = 0;
  }

  const micBtn = document.getElementById("mic");
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null, listening = false;
  if (SR) {
    recog = new SR();
    recog.lang = "en-GB"; recog.interimResults = false; recog.maxAlternatives = 1;
    recog.onresult = e => {
      const transcript = e.results[0][0].transcript;
      document.getElementById("q").value = transcript;
      submitQuery(transcript);
    };
    recog.onerror = () => { setStatus("mic error — check Chrome permissions"); stopListening(); };
    recog.onend = () => stopListening();
  } else {
    micBtn.disabled = true; micBtn.title = "Speech recognition needs Chrome";
  }
  function startListening() {
    if (!recog || listening) return;
    unlockAudio(); window.speechSynthesis.cancel();
    try { recog.start(); } catch (_) { return; }
    listening = true; micBtn.classList.add("live"); setStatus("listening…", true);
  }
  function stopListening() {
    listening = false; micBtn.classList.remove("live");
    if (statusEl.textContent.includes("listening")) setStatus("");
  }
  micBtn.onclick = () => listening ? recog.stop() : startListening();

  // ===================================================================== //
  //  PROMPT 2 / 4 / 6 — BRAIN, FLY-TO-SOURCE, TOTAL RECALL
  // ===================================================================== //
  const answerEl = document.getElementById("answer");
  function showAnswer(text) {
    answerEl.querySelector(".text").textContent = text;
    answerEl.classList.add("show");
    clearTimeout(showAnswer._t);
    showAnswer._t = setTimeout(() => answerEl.classList.remove("show"), 14000);
  }

  const SESSION = "s-" + Math.random().toString(36).slice(2);
  const qInput = document.getElementById("q");
  document.getElementById("send").onclick = () => submitQuery(qInput.value);
  qInput.addEventListener("keydown", e => { if (e.key === "Enter") submitQuery(qInput.value); });

  async function submitQuery(text) {
    text = (text || "").trim();
    if (!text) return;
    qInput.value = "";
    unlockAudio();
    if (/^remember\b/i.test(text)) return rememberThat(text);   // Prompt 6

    setStatus("thinking…", true);
    try {
      const res = await fetch("/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session: SESSION })
      });
      const data = await res.json();
      setStatus("");
      const ans = data.answer || "My apologies, sir — something went awry.";
      showAnswer(ans); speak(ans);
      flyToSources(data.nodes || []);                            // Prompt 4
    } catch (err) {
      setStatus("");
      const msg = "I couldn't reach the brain, sir. Is the server running?";
      showAnswer(msg); speak(msg);
    }
  }

  // PROMPT 4 — fly-to-source: prove where the answer came from.
  function flyToSources(nodeIds) {
    if (!nodeIds || !nodeIds.length) return;
    const nodes = Graph.graphData().nodes;
    const byId = new Map(nodes.map(n => [n.id, n]));
    const used = nodeIds.map(id => byId.get(id)).filter(Boolean);
    if (!used.length) return;
    if (used.length >= 4) {
      applyHighlight(used.map(n => n.id));
      const cx = avg(used, "x"), cy = avg(used, "y"), cz = avg(used, "z");
      Graph.cameraPosition({ x: cx * 1.9 + 60, y: cy * 1.9 + 60, z: cz * 1.9 + 220 },
                           { x: cx, y: cy, z: cz }, 1600);
      openPanel(used[0]);
    } else {
      focusNode(used[0], true);
    }
  }
  const avg = (arr, k) => arr.reduce((s, n) => s + (n[k] || 0), 0) / arr.length;

  // PROMPT 6 — Total Recall: write a note and birth a new star.
  async function rememberThat(text) {
    setStatus("committing to memory…", true);
    try {
      const res = await fetch("/remember", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      setStatus("");
      if (!data.ok) { const m = data.answer || "I couldn't note that down, sir."; showAnswer(m); speak(m); return; }
      bornNode(data);
      const line = data.answer || "Noted, sir.";
      showAnswer(line); speak(line);
    } catch (err) {
      setStatus("");
      const m = "The memory bank didn't respond, sir.";
      showAnswer(m); speak(m);
    }
  }

  function bornNode(data) {
    const g = Graph.graphData();
    const near = (typeof data.near === "number") ? g.nodes.find(n => n.id === data.near) : null;
    const node = {
      id: data.id, label: data.label, group: data.group || "captures",
      excerpt: data.excerpt || "", path: data.path || "",
    };
    if (near) { node.x = near.x; node.y = near.y; node.z = near.z; }
    if (!groupColor[node.group]) { groupColor[node.group] = PALETTE[GROUPS.length % PALETTE.length]; GROUPS.push(node.group); }
    g.nodes.push(node);
    neighbors.set(node.id, new Set());
    if (near) {
      g.links.push({ source: node.id, target: near.id });
      neighbors.get(node.id).add(near.id);
      neighbors.get(near.id)?.add(node.id);
    }
    Graph.graphData(g);
    setTimeout(() => {
      pulsing.set(node.id, { until: Date.now() + 2600 });        // glow pulse
      const live = Graph.graphData().nodes.find(n => n.id === node.id);
      if (live) focusNode(live, true);
    }, 350);
  }

  // Small handle for debugging in the console (and for the "paste the error,
  // fix it" workflow): window.Jarvis.Graph, .submitQuery, etc.
  window.Jarvis = { Graph, submitQuery, rememberThat, focusNode };
  </script>
</body>
</html>
